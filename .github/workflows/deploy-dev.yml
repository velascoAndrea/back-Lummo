name: Deploy Dev

on:
  push:
    branches: [dev]

jobs:
  deploy-backend:
    name: Backend → Lambda (dev)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Build Lambda package
        run: |
          mkdir -p package
          pip install -r requirements.txt -t package/ \
            --platform manylinux2014_x86_64 \
            --implementation cp \
            --python-version 3.11 \
            --only-binary=:all: \
            --upgrade --quiet
          cp -r app/ package/app/
          cd package && zip -r ../lambda.zip . -x "*.pyc" -x "*/__pycache__/*" && cd ..

      - name: Upload package to S3
        run: |
          aws s3 cp lambda.zip s3://${{ secrets.DEPLOYMENTS_S3_BUCKET }}/dev/lambda.zip

      - name: Update Lambda code
        run: |
          aws lambda update-function-code \
            --function-name ${{ secrets.DEV_LAMBDA_FUNCTION }} \
            --s3-bucket ${{ secrets.DEPLOYMENTS_S3_BUCKET }} \
            --s3-key dev/lambda.zip \
            --region ${{ secrets.AWS_REGION }}
          aws lambda wait function-updated \
            --function-name ${{ secrets.DEV_LAMBDA_FUNCTION }} \
            --region ${{ secrets.AWS_REGION }}

      - name: Update Lambda environment
        run: |
          aws lambda update-function-configuration \
            --function-name ${{ secrets.DEV_LAMBDA_FUNCTION }} \
            --environment "Variables={
              DATABASE_URL=${{ secrets.DEV_DATABASE_URL }},
              SECRET_KEY=${{ secrets.SECRET_KEY }},
              ALLOWED_ORIGINS=https://${{ secrets.DEV_AMPLIFY_DOMAIN }},
              ENVIRONMENT=dev
            }" \
            --region ${{ secrets.AWS_REGION }}
